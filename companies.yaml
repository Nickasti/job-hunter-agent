# ============================================================================
#  companies.yaml — Career page da monitorare (Fonte 2)
# ============================================================================
#
# Ogni voce supporta i campi:
#   name            : nome azienda (mostrato nelle notifiche)
#   enabled         : true/false (per disattivare temporaneamente una fonte)
#   strategy        : "api" | "static" | "dynamic"
#   career_page_url : URL della pagina annunci (per static/dynamic)
#   api_type        : "greenhouse" | "lever"   (solo se strategy=api)
#   api_token       : board token dell'ATS      (solo se strategy=api)
#   selector        : CSS selector delle card/anchor dei job (static/dynamic, opz.)
#   location_filter : lista; tiene solo i job che citano una di queste stringhe
#   keyword_filter  : lista; tiene solo i titoli che contengono una di queste
#   verified        : true se config testata; false = DA VERIFICARE al 1° run
#
# IMPORTANTE: i campi `api_token`, `career_page_url` e `selector` delle voci con
# `verified: false` sono BEST-GUESS. Verificali aprendo la career page reale e,
# se serve, aggiorna token/URL/selector. Vedi sezione "Tarare le aziende" nel
# README. Le voci con strategy=dynamic richiedono Playwright installato.
# ============================================================================

# ---- ATS con API pubblica (più affidabili) --------------------------------

- name: Cloudflare
  enabled: true
  strategy: api
  api_type: greenhouse
  api_token: cloudflare
  location_filter: ["Lisbon", "Lisboa", "Portugal"]
  keyword_filter: ["intern", "internship", "trainee", "junior", "graduate", "estágio", "estagio"]
  verified: false

