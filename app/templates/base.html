<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VeredAI{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23161512'/%3E%3Cpath d='M16 18 L50 50 L84 18' stroke='%23f4f3ef' stroke-width='11' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M16 82 L50 50 L84 82' stroke='%23f4f3ef' stroke-width='11' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M50 33 L50 67' stroke='%233f6b46' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --ok:#22c55e; --warn:#f59e0b; --text:#e2e8f0; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px; }
    h1,h2,h3 { line-height:1.2; }
    a { color: var(--accent); }
    .card { background:var(--card); border-radius:14px; padding:20px; margin:16px 0; box-shadow:0 4px 16px rgba(0,0,0,.25); }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    label { display:block; font-size:.85rem; color:var(--muted); margin:10px 0 4px; }
    input, select { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:var(--text); }
    button, .btn { display:inline-block; padding:10px 16px; border-radius:10px; border:0; background:var(--accent); color:#00131f; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn.secondary { background:#334155; color:var(--text); }
    .btn.ghost { background:transparent; border:1px solid #334155; color:var(--text); }
    .ok { color:var(--ok); } .pending { color:var(--warn); } .muted{ color:var(--muted); }
    .pill { font-size:.75rem; padding:3px 8px; border-radius:999px; background:#0b1220; border:1px solid #334155; }
    .err { background:#7f1d1d; color:#fecaca; padding:10px 12px; border-radius:10px; margin:10px 0; }
    .job { border-top:1px solid #334155; padding:14px 0; }
    .score { font-weight:700; font-size:1.1rem; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:640px){ .grid2 { grid-template-columns:1fr; } }
    table { width:100%; border-collapse:collapse; font-size:.85rem; }
    td,th { text-align:left; padding:6px 8px; border-bottom:1px solid #23324a; }
    nav.top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="top">
      <strong style="display:inline-flex;align-items:center;gap:9px">
        <svg width="26" height="26" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="border-radius:7px">
          <rect width="100" height="100" rx="22" fill="#161512"></rect>
          <path d="M16 18 L50 50 L84 18" stroke="#f4f3ef" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
          <path d="M16 82 L50 50 L84 82" stroke="#f4f3ef" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
          <path d="M50 33 L50 67" stroke="#3f6b46" stroke-width="7" stroke-linecap="round"></path>
        </svg>
        VeredAI
      </strong>
      <span>
        {% if request.session.get('user_id') %}
          <a class="btn ghost" href="/dashboard">Dashboard</a>
          <form action="/logout" method="post" style="display:inline">
            <button class="btn secondary">Esci</button>
          </form>
        {% endif %}
      </span>
    </nav>
    {% block body %}{% endblock %}
  </div>
</body>
</html>
