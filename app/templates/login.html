<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accedi · VeredAI</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23161512'/%3E%3Cpath d='M16 18 L50 50 L84 18' stroke='%23f4f3ef' stroke-width='11' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M16 82 L50 50 L84 82' stroke='%23f4f3ef' stroke-width='11' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M50 33 L50 67' stroke='%233f6b46' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fustat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:#161512;
      background:linear-gradient(160deg,#f3f6ef 0%,#dbe8d1 42%,#aecb9b 78%,#6f9a5c 100%);
      display:flex;flex-direction:column;}
    a{color:inherit;}
    .topbar{padding:22px 32px;}
    .logo{display:inline-flex;align-items:center;gap:10px;
      font-family:'Schibsted Grotesk';font-weight:600;font-size:22px;letter-spacing:-1.2px;color:#161512;text-decoration:none;}
    .logo svg{display:block;border-radius:9px;box-shadow:0 2px 10px rgba(0,0,0,.15);}
    .center{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:36px 32px;
      box-shadow:0 24px 60px rgba(35,60,25,.18);border:1px solid rgba(255,255,255,.6);}
    h1{font-family:'Fustat','Inter',sans-serif;font-weight:700;letter-spacing:-1.6px;font-size:34px;margin:0 0 4px;}
    .lead{color:#66735c;margin:0 0 22px;font-size:.95rem;}
    label{display:block;font-size:.82rem;color:#78856c;margin:14px 0 6px;font-weight:500;}
    input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #e5ecdf;background:#f8faf5;
      color:#161512;font-family:'Inter';font-size:.98rem;transition:border-color .15s, box-shadow .15s;}
    input:focus{outline:none;border-color:#7fa76a;box-shadow:0 0 0 3px rgba(111,154,92,.24);background:#fff;}
    .btn{margin-top:22px;width:100%;height:50px;border:0;border-radius:12px;background:#161512;color:#fff;
      font-family:'Schibsted Grotesk';font-weight:600;font-size:16px;cursor:pointer;transition:transform .12s, box-shadow .12s;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(0,0,0,.22);}
    .alt{margin-top:18px;text-align:center;font-size:.9rem;color:#66735c;}
    .alt a{font-weight:600;color:#161512;}
    .err{background:#fde8e4;color:#9b2c1e;border:1px solid #f6c6bd;padding:11px 13px;border-radius:12px;margin-top:8px;font-size:.9rem;}
  </style>
</head>
<body>
  <div class="topbar">
    <a class="logo" href="/">
      <svg width="30" height="30" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="100" height="100" rx="22" fill="#161512"></rect>
        <path d="M16 18 L50 50 L84 18" stroke="#f4f3ef" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
        <path d="M16 82 L50 50 L84 82" stroke="#f4f3ef" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
        <path d="M50 33 L50 67" stroke="#3f6b46" stroke-width="7" stroke-linecap="round"></path>
      </svg>
      <span>VeredAI</span>
    </a>
  </div>

  <div class="center">
    <div class="card">
      <h1>Bentornato</h1>
      <p class="lead">Accedi per riprendere il tuo percorso.</p>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
      <form action="/login" method="post">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="email" placeholder="tu@esempio.com">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
        <button class="btn" type="submit">Entra</button>
      </form>
      <p class="alt">Non hai un account? <a href="/register">Registrati</a></p>
    </div>
  </div>
</body>
</html>
