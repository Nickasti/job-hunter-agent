name: job-hunter-agent

# Esecuzione oraria (UTC) + avvio manuale dalla tab "Actions".
# NB: la root di questo repository è la cartella job-hunter-agent/ stessa.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# Serve per ricommittare storage/jobs.db (persistenza dedup).
permissions:
  contents: write

# Evita run sovrapposti se uno precedente è ancora in corso.
concurrency:
  group: job-hunter-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache dei browser Playwright per non riscaricarli ogni run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run agent (single-shot)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SCORE_THRESHOLD: ${{ vars.SCORE_THRESHOLD }}
        run: python main.py

      # Persistenza: ricommitta jobs.db se è cambiato. Il messaggio contiene
      # [skip ci] per sicurezza (il trigger è 'schedule', quindi non si auto-innesca).
      - name: Persist jobs.db
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/jobs.db
          if git diff --cached --quiet; then
            echo "Nessuna modifica a jobs.db."
          else
            git commit -m "chore: update jobs.db [skip ci]"
            git push
          fi
