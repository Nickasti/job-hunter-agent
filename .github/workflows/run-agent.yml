name: job-hunter-cron

# La logica applicativa vive sull'app web (Render). Qui GitHub Actions fa SOLO
# da "sveglia" gratuita: ogni ora chiama l'endpoint /api/run-cycle sul server
# dove risiedono i dati. Nessuna logica di scraping/scoring in questo YAML.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: job-hunter-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger run-cycle sull'app web
        env:
          RUN_CYCLE_URL: ${{ secrets.RUN_CYCLE_URL }}      # es. https://<app>.onrender.com/api/run-cycle
          RUN_CYCLE_TOKEN: ${{ secrets.RUN_CYCLE_TOKEN }}
        run: |
          if [ -z "$RUN_CYCLE_URL" ] || [ -z "$RUN_CYCLE_TOKEN" ]; then
            echo "::error::Imposta i secret RUN_CYCLE_URL e RUN_CYCLE_TOKEN nel repo."
            exit 1
          fi
          # --max-time alto per tollerare il cold start del free tier Render.
          # --retry per riprovare se il dyno si sta risvegliando.
          # --max-time alto: l'arricchimento LinkedIn allunga il ciclo.
          curl -sS --fail-with-body \
               --max-time 300 --retry 2 --retry-delay 20 --retry-connrefused \
               -X POST "$RUN_CYCLE_URL" \
               -H "Authorization: Bearer $RUN_CYCLE_TOKEN"
